<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Radial Menu</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:380px; height:380px;
  background:transparent; overflow:hidden;
  user-select:none; -webkit-user-select:none;
  font-family:'Segoe UI',system-ui,sans-serif;
}
#backdrop {
  position:fixed; inset:0;
  background:rgba(10,10,15,0.6);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-radius:50%;
  opacity:0; transform:scale(0.4);
  transition:opacity 0.25s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
#backdrop.visible { opacity:1; transform:scale(1); }
#backdrop::after {
  content:''; position:absolute; inset:5px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:inset 0 0 50px rgba(0,0,0,0.3);
}
#center-btn {
  position:fixed; left:50%; top:50%;
  transform:translate(-50%,-50%) scale(0.3);
  width:46px; height:46px; border-radius:50%;
  background:rgba(40,40,46,0.95);
  border:1.5px solid rgba(255,255,255,0.12);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:20; opacity:0;
  transition:opacity 0.2s 0.08s, transform 0.28s 0.08s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
  box-shadow:0 3px 24px rgba(0,0,0,0.7);
}
#center-btn.visible { opacity:1; transform:translate(-50%,-50%) scale(1); }
#center-btn:hover { background:rgba(220,50,50,0.75); }
#center-btn:hover svg line { stroke:#fff; }
#center-btn svg line { stroke:#999; transition:stroke 0.15s; }

/* Settings gear button */
#settings-btn {
  position:fixed; left:50%; top:50%;
  transform:translate(calc(-50% + 0px), calc(-50% + 56px)) scale(0.3);
  width:28px; height:28px; border-radius:50%;
  background:rgba(60,60,70,0.85);
  border:1px solid rgba(255,255,255,0.1);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:20; opacity:0;
  transition:opacity 0.2s 0.15s, transform 0.28s 0.15s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
  font-size:13px;
}
#settings-btn.visible { opacity:0.7; transform:translate(calc(-50%), calc(-50% + 56px)) scale(1); }
#settings-btn:hover { opacity:1 !important; background:rgba(80,80,100,0.9); }

.item {
  position:fixed; width:68px; height:68px; border-radius:50%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; z-index:10; opacity:0;
  transform:translate(var(--fx),var(--fy)) scale(0.15);
  transition:opacity 0.22s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
             box-shadow 0.18s, filter 0.18s;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
  border:2px solid rgba(255,255,255,0.2);
}
.item.visible { opacity:1; transform:translate(var(--tx),var(--ty)) scale(1); }
.item:hover {
  transform:translate(var(--tx),var(--ty)) scale(1.2) !important;
  box-shadow:0 8px 36px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,255,255,0.3);
  filter:brightness(1.15); z-index:15;
}
.item:active { transform:translate(var(--tx),var(--ty)) scale(1.05) !important; }
.item-icon { font-size:26px; line-height:1; pointer-events:none; }
.item-label {
  font-size:8px; font-weight:700; color:rgba(255,255,255,0.92);
  margin-top:3px; letter-spacing:0.3px; pointer-events:none;
  text-shadow:0 1px 4px rgba(0,0,0,0.9); white-space:nowrap;
  max-width:62px; overflow:hidden; text-overflow:ellipsis; text-align:center;
}
@keyframes ripple {
  0%   { box-shadow:0 0 0 0 rgba(255,255,255,0.5),0 4px 24px rgba(0,0,0,0.5); }
  100% { box-shadow:0 0 0 22px rgba(255,255,255,0),0 4px 24px rgba(0,0,0,0.5); }
}
.item.rippling { animation:ripple 0.4s ease-out; }

#tooltip {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  background:rgba(15,15,20,0.94); color:#f0f0f5;
  font-size:11px; font-weight:600; padding:5px 14px;
  border-radius:20px; pointer-events:none; opacity:0;
  transition:opacity 0.15s; white-space:nowrap;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
  letter-spacing:0.3px; z-index:30;
}
#tooltip.show { opacity:1; }
</style>
</head>
<body>

<div id="backdrop"></div>

<button id="center-btn" onclick="closeMenu()">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<button id="settings-btn" onclick="openSettings()" title="Manage Shortcuts">⚙️</button>

<div id="tooltip"></div>

<script>
const { ipcRenderer } = require('electron');

const CX = 190, CY = 190, RADIUS = 118, ITEM_SIZE = 68;
let currentItems = [];

function degToRad(deg) { return (deg - 90) * Math.PI / 180; }

function buildMenu(items) {
  // Remove old items
  document.querySelectorAll('.item').forEach(e => e.remove());
  currentItems = items;

  items.forEach((item, i) => {
    const rad = degToRad(item.angle);
    const tx = Math.round(CX - ITEM_SIZE/2 + Math.cos(rad) * RADIUS);
    const ty = Math.round(CY - ITEM_SIZE/2 + Math.sin(rad) * RADIUS);
    const fx = Math.round(CX - ITEM_SIZE/2 + Math.cos(rad) * 18);
    const fy = Math.round(CY - ITEM_SIZE/2 + Math.sin(rad) * 18);

    const el = document.createElement('div');
    el.className = 'item';
    el.style.cssText = `left:${fx}px;top:${fy}px;--tx:${tx-fx}px;--ty:${ty-fy}px;background:${item.bg};transition-delay:${0.03 + i*0.025}s`;
    el.innerHTML = `<span class="item-icon">${item.icon}</span><span class="item-label">${item.label}</span>`;

    el.addEventListener('mouseenter', () => showTip(item.label));
    el.addEventListener('mouseleave', hideTip);
    el.addEventListener('click', e => {
      e.stopPropagation();
      el.classList.add('rippling');
      setTimeout(() => el.classList.remove('rippling'), 400);
      ipcRenderer.send('execute-action', item);
    });

    document.body.appendChild(el);
  });
}

// ── Show / Hide ───────────────────────────────────────────────────────────────
let visible = false;

function showMenu(items) {
  buildMenu(items);
  if (visible) return;
  visible = true;
  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('center-btn').classList.add('visible');
  document.getElementById('settings-btn').classList.add('visible');
  requestAnimationFrame(() => {
    document.querySelectorAll('.item').forEach(el => { void el.offsetWidth; el.classList.add('visible'); });
  });
}

function hideMenuAnim() {
  visible = false;
  document.getElementById('backdrop').classList.remove('visible');
  document.getElementById('center-btn').classList.remove('visible');
  document.getElementById('settings-btn').classList.remove('visible');
  document.querySelectorAll('.item').forEach(el => el.classList.remove('visible'));
  hideTip();
}

function closeMenu() { ipcRenderer.send('hide-menu'); hideMenuAnim(); }
function openSettings() { ipcRenderer.send('open-settings'); closeMenu(); }

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let tipTimer;
function showTip(t) { clearTimeout(tipTimer); tooltip.textContent = t; tooltip.classList.add('show'); }
function hideTip() { tipTimer = setTimeout(() => tooltip.classList.remove('show'), 80); }

// ── IPC ───────────────────────────────────────────────────────────────────────
ipcRenderer.on('show-menu', (_e, items) => showMenu(items));
ipcRenderer.on('hide-menu', () => hideMenuAnim());
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
</script>
</body>
</html>
